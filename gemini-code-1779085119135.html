<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>极简图片转码工具</title>
</head>
<body>
    <h2>图片转码小工具 (PNG -> JPG)</h2>
    <input type="file" id="upload" accept="image/png"><br><br>
    <canvas id="canvas" style="display:none;"></canvas>
    <a id="download" style="display:none;">下载转码后的图片</a>

    <script>
        const upload = document.getElementById('upload');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const downloadLink = document.getElementById('download');

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // 1. 设置画布大小与原图一致
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    // 2. 将原图画到画布上
                    ctx.drawImage(img, 0, 0);
                    
                    // 3. 核心：将画布内容导出为 JPG 格式，0.8 表示 80% 的清晰度（压缩）
                    const jpgUrl = canvas.toDataURL('image/jpeg', 0.8);
                    
                    // 4. 设置下载链接
                    downloadLink.href = jpgUrl;
                    downloadLink.download = 'converted_image.jpg';
                    downloadLink.style.display = 'inline';
                    downloadLink.innerText = '点击下载 JPG 图片';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
